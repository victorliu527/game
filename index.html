<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数学蛇：智能提醒版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; -webkit-user-select: none; overflow: hidden; background: #f8fafc; font-family: 'PingFang SC', sans-serif; }
        
        #game-area { 
            position: relative; width: 100%; height: 50vh; background-color: #f1f5f9;
            background-image: linear-gradient(white 2px, transparent 2px), linear-gradient(90deg, white 2px, transparent 2px);
            background-size: 25px 25px; border-radius: 20px; overflow: hidden; border: 4px solid #cbd5e1; 
            transition: background-color 0.3s;
        }

        /* 错误时的震动动画 */
        .shake { animation: shake-anim 0.4s cubic-bezier(.36,.07,.19,.97) both; background-color: #fee2e2 !important; }
        @keyframes shake-anim {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .snake-dot { position: absolute; width: 23px; height: 23px; background: #38bdf8; border-radius: 6px; transition: all 0.15s linear; z-index: 10; }
        .snake-head { background: #0284c7; border: 2px solid #bae6fd; }
        
        .number-food { position: absolute; font-size: 2rem; font-weight: 900; color: #6366f1; transform: translate(-50%, -50%); z-index: 5; text-shadow: 2px 2px 0px white; }
        .food-hint { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }
        
        /* 浮动提示气泡 */
        #error-toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 8px 16px; rounded: 12px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-sm flex justify-between items-center mb-4 px-2">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🏆</span>
            <span id="high-score" class="text-xl font-bold text-orange-500">0</span>
        </div>
        <button id="pause-btn" onclick="togglePause()" class="bg-white border-2 border-slate-200 px-4 py-1 rounded-full font-bold text-slate-600 active:bg-slate-100 italic">⏸ 暂停</button>
        <div class="font-bold text-sky-600 text-xl">得分: <span id="score">0</span></div>
    </div>

    <div id="game-area">
        <div id="error-toast">再算一下哦 💡</div>
        <div id="pause-overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm">
            <button onclick="togglePause()" class="bg-white text-indigo-600 px-8 py-4 rounded-3xl text-3xl font-black shadow-2xl">继续 ▶️</button>
        </div>
    </div>

    <div class="w-full max-w-sm bg-white p-4 rounded-3xl shadow-xl border-2 border-indigo-50 mt-4 mb-4 text-center">
        <div id="question" class="text-5xl font-black text-slate-800 tracking-tighter">10 + 5</div>
    </div>

    <div class="w-full max-w-sm grid grid-cols-3 gap-3">
        <div class="flex flex-col items-center justify-center bg-white rounded-2xl border-2 border-slate-100 p-2">
            <span class="text-[10px] text-gray-400 font-bold uppercase">范围</span>
            <input type="range" id="diff" min="10" max="30" value="10" class="w-full h-1 bg-gray-200 accent-indigo-500" oninput="document.getElementById('rv').innerText=this.value;resetGame()">
            <span id="rv" class="text-xs font-bold text-indigo-600">10</span>
        </div>
        <button onclick="changeDir('up')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-[0_5px_0_#4338ca] active:translate-y-1 active:shadow-none">⬆️</button>
        <div class="flex items-center justify-center text-2xl">🐍</div>
        
        <button onclick="changeDir('left')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-[0_5px_0_#4338ca] active:translate-y-1 active:shadow-none">⬅️</button>
        <button onclick="changeDir('down')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-[0_5px_0_#4338ca] active:translate-y-1 active:shadow-none">⬇️</button>
        <button onclick="changeDir('right')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-[0_5px_0_#4338ca] active:translate-y-1 active:shadow-none">➡️</button>
    </div>

    <script>
        const AREA = document.getElementById('game-area');
        const STEP = 25; 
        const snakeDots = [{x: 125, y: 125}];
        let direction = 'right', score = 0, currentAns = 0, foods = [], gameInterval;
        let isPaused = false;
        let highScore = localStorage.getItem('snakeMathHigh') || 0;
        document.getElementById('high-score').innerText = highScore;

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').classList.toggle('hidden');
            document.getElementById('pause-btn').innerText = isPaused ? "▶️ 继续" : "⏸ 暂停";
        }

        function resetGame() {
            clearInterval(gameInterval);
            score = 0; document.getElementById('score').innerText = 0;
            snakeDots.length = 1; snakeDots[0] = {x: 125, y: 125};
            direction = 'right';
            nextQuestion();
            gameInterval = setInterval(update, 400); 
        }

        function nextQuestion() {
            const max = parseInt(document.getElementById('diff').value);
            const isAdd = Math.random() > 0.5;
            if(isAdd) {
                currentAns = Math.floor(Math.random() * (max - 2)) + 2;
                let a = Math.floor(Math.random() * (currentAns - 1)) + 1;
                document.getElementById('question').innerText = `${a} + ${currentAns - a}`;
            } else {
                let a = Math.floor(Math.random() * (max - 5)) + 5;
                let b = Math.floor(Math.random() * (a - 1)) + 1;
                currentAns = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }
            spawnFoods();
        }

        function spawnFoods() {
            const wCells = Math.floor(AREA.offsetWidth / STEP) - 2;
            const hCells = Math.floor(AREA.offsetHeight / STEP) - 2;
            let wrong = currentAns + (Math.random() > 0.5 ? (Math.floor(Math.random()*3)+1) : -(Math.floor(Math.random()*3)+1));
            if(wrong < 0) wrong = currentAns + 2;
            foods = [
                {val: currentAns, x: (Math.floor(Math.random()*wCells)+1)*STEP, y: (Math.floor(Math.random()*hCells)+1)*STEP, ok: true},
                {val: wrong, x: (Math.floor(Math.random()*wCells)+1)*STEP, y: (Math.floor(Math.random()*hCells)+1)*STEP, ok: false}
            ];
            renderFoods();
        }

        function update() {
            if(isPaused) return;
            const head = {...snakeDots[0]};
            if(direction === 'up') head.y -= STEP;
            else if(direction === 'down') head.y += STEP;
            else if(direction === 'left') head.x -= STEP;
            else if(direction === 'right') head.x += STEP;

            if (head.x < 0) head.x = Math.floor(AREA.offsetWidth/STEP)*STEP - STEP;
            else if (head.x >= AREA.offsetWidth) head.x = 0;
            if (head.y < 0) head.y = Math.floor(AREA.offsetHeight/STEP)*STEP - STEP;
            else if (head.y >= AREA.offsetHeight) head.y = 0;

            snakeDots.unshift(head);
            let ate = false;
            foods.forEach(f => {
                if(Math.abs(head.x + 12 - f.x) < 20 && Math.abs(head.y + 12 - f.y) < 20) {
                    if(f.ok) {
                        score++;
                        document.getElementById('score').innerText = score;
                        if(score > highScore) {
                            highScore = score;
                            localStorage.setItem('snakeMathHigh', highScore);
                            document.getElementById('high-score').innerText = highScore;
                        }
                        ate = true;
                        nextQuestion();
                    } else {
                        triggerError(); // 触发错误提醒
                        spawnFoods(); 
                    }
                }
            });
            if(!ate) snakeDots.pop();
            render();
        }

        function triggerError() {
            // 震动效果
            AREA.classList.add('shake');
            // 气泡提示
            const toast = document.getElementById('error-toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                AREA.classList.remove('shake');
                toast.style.opacity = '0';
            }, 500);
        }

        function render() {
            AREA.querySelectorAll('.snake-dot').forEach(el => el.remove());
            snakeDots.forEach((d, i) => {
                const dot = document.createElement('div');
                dot.className = `snake-dot ${i===0?'snake-head':''}`;
                dot.style.left = d.x + 'px'; dot.style.top = d.y + 'px';
                AREA.appendChild(dot);
            });
        }

        function renderFoods() {
            AREA.querySelectorAll('.number-food').forEach(el => el.remove());
            foods.forEach(f => {
                const el = document.createElement('div');
                el.className = "number-food " + (f.ok?'food-hint':'');
                el.innerText = f.val;
                el.style.left = f.x + 'px'; el.style.top = f.y + 'px';
                AREA.appendChild(el);
            });
        }

        function changeDir(d) { if(!isPaused) direction = d; }
        resetGame();
    </script>
</body>
</html>
