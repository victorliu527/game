<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数学蛇：iPad 适配版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; -webkit-user-select: none; overflow: hidden; background: #f1f5f9; font-family: 'PingFang SC', sans-serif; height: 100vh; margin: 0; padding: 0; }
        
        /* 全屏 Flex 布局 */
        #main-layout { display: flex; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; gap: 20px; }

        /* 游戏核心区：自适应剩余空间 */
        #game-container { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; }
        #game-area { 
            position: relative; width: 100%; height: 100%; background: #ffffff;
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
            border-radius: 24px; overflow: hidden; border: 4px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* 侧边控制面板 */
        .side-panel { width: 220px; display: flex; flex-direction: column; gap: 15px; justify-content: center; }

        /* 按钮样式：加大尺寸方便 iPad 点击 */
        .ctrl-btn { 
            background: #6366f1; color: white; font-size: 2.5rem; padding: 25px 0; border-radius: 20px; 
            shadow: 0 6px 0 #4338ca; transition: all 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .ctrl-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #4338ca; }

        /* 蛇和食物 */
        .snake-dot { position: absolute; border-radius: 6px; z-index: 10; transition: all 0.1s linear; }
        .snake-head { z-index: 11; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .number-food { position: absolute; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; z-index: 5; color: #1e293b; }

        .shake { animation: shake-anim 0.4s both; background-color: #fee2e2 !important; }
        @keyframes shake-anim { 10%, 90% { transform: translate3d(-3px, 0, 0); } 30%, 70% { transform: translate3d(-5px, 0, 0); } }

        /* 手机竖屏兼容 */
        @media (orientation: portrait) {
            #main-layout { flex-direction: column; padding: 10px; }
            .side-panel { width: 100%; order: 2; flex-direction: row; flex-wrap: wrap; height: auto; }
            #game-container { order: 1; flex: 1.5; }
        }
    </style>
</head>
<body>

    <div id="main-layout">
        
        <div class="side-panel">
            <div class="grid grid-cols-3 gap-3">
                <div></div>
                <button onclick="changeDir('up')" class="ctrl-btn col-span-1">⬆️</button>
                <div></div>
                
                <button onclick="changeDir('left')" class="ctrl-btn">⬅️</button>
                <button onclick="changeDir('down')" class="ctrl-btn">⬇️</button>
                <button onclick="changeDir('right')" class="ctrl-btn">➡️</button>
            </div>
            
            <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 mt-4">
                <p class="text-center text-xs font-bold text-slate-400 mb-2 italic">难度范围: <b id="rv" class="text-indigo-600">10</b></p>
                <input type="range" id="diff" min="10" max="50" value="10" class="w-full h-2 accent-indigo-500" oninput="updateDifficulty(this.value)">
            </div>
        </div>

        <div id="game-container">
            <div id="game-area">
                <div id="pause-overlay" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/60 backdrop-blur-md text-white">
                    <p class="text-2xl mb-8 font-black">GAME PAUSED</p>
                    <button onclick="togglePause()" class="bg-white text-indigo-600 px-12 py-5 rounded-full text-3xl font-black shadow-2xl active:scale-95">CONTINUE ▶️</button>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="bg-white p-6 rounded-[32px] shadow-lg border-4 border-indigo-500 text-center">
                <p class="text-slate-400 text-sm font-bold">SOLVE THIS</p>
                <div id="question" class="text-5xl font-black text-slate-800 my-2">? + ?</div>
            </div>

            <div class="flex justify-between gap-3">
                <div class="flex-1 bg-white p-4 rounded-2xl text-center border">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Score</p>
                    <p id="score" class="text-3xl font-black text-sky-500">0</p>
                </div>
                <div class="flex-1 bg-white p-4 rounded-2xl text-center border">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Best</p>
                    <p id="high-score" class="text-3xl font-black text-orange-500">0</p>
                </div>
            </div>

            <button onclick="togglePause()" class="bg-slate-800 text-white py-4 rounded-2xl font-bold text-xl active:bg-slate-700">⏸ 暂停游戏</button>
        </div>

    </div>

    <script>
        const AREA = document.getElementById('game-area');
        let STEP = 40; // iPad 上网格稍微大一点
        let snakeDots = [];
        const COLORS = ['#38bdf8', '#4ade80', '#fbbf24', '#a78bfa', '#f43f5e'];
        let direction = 'right', score = 0, currentAns = 0, foods = [], gameInterval, isPaused = false;
        let highScore = localStorage.getItem('snakeMathHigh') || 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, dur) {
            if(isPaused || audioCtx.state === 'suspended') return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function initGrid() {
            // 根据高度动态调整步长，确保纵向格子数在 10-12 左右，适合口算
            STEP = Math.floor(AREA.offsetHeight / 10);
            AREA.style.backgroundSize = `${STEP}px ${STEP}px`;
            if (snakeDots.length === 0) snakeDots = [{x: STEP*2, y: STEP*2}];
            render();
        }

        function saveGameState() {
            const state = { snakeDots, direction, score, currentAns, foods, diff: document.getElementById('diff').value, question: document.getElementById('question').innerText };
            localStorage.setItem('snakeMathState', JSON.stringify(state));
        }

        function loadGameState() {
            const saved = localStorage.getItem('snakeMathState');
            if(saved) {
                const s = JSON.parse(saved);
                snakeDots = s.snakeDots; direction = s.direction; score = s.score;
                currentAns = s.currentAns; foods = s.foods;
                document.getElementById('diff').value = s.diff;
                document.getElementById('rv').innerText = s.diff;
                document.getElementById('question').innerText = s.question;
                document.getElementById('score').innerText = score;
                return true;
            }
            return false;
        }

        window.addEventListener('resize', initGrid);
        document.addEventListener('visibilitychange', () => { if (document.hidden && !isPaused) togglePause(true); });

        function togglePause(forcePause = false) {
            if(forcePause) isPaused = true; else isPaused = !isPaused;
            document.getElementById('pause-overlay').classList.toggle('hidden', !isPaused);
            if(!isPaused) { audioCtx.resume(); saveGameState(); }
        }

        function updateDifficulty(v) { document.getElementById('rv').innerText = v; resetGame(); }

        function resetGame() {
            clearInterval(gameInterval);
            score = 0; document.getElementById('score').innerText = 0;
            initGrid();
            snakeDots = [{x: STEP*2, y: STEP*2}];
            direction = 'right';
            nextQuestion();
            gameInterval = setInterval(update, 450);
            saveGameState();
        }

        function nextQuestion() {
            const max = parseInt(document.getElementById('diff').value);
            const isAdd = Math.random() > 0.5;
            if(isAdd) {
                currentAns = Math.floor(Math.random() * (max - 2)) + 2;
                let a = Math.floor(Math.random() * (currentAns - 1)) + 1;
                document.getElementById('question').innerText = `${a} + ${currentAns - a}`;
            } else {
                let a = Math.floor(Math.random() * (max - 5)) + 5;
                let b = Math.floor(Math.random() * (a - 1)) + 1;
                currentAns = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }
            spawnFoods();
        }

        function spawnFoods() {
            const maxX = Math.floor(AREA.offsetWidth / STEP) - 1;
            const maxY = Math.floor(AREA.offsetHeight / STEP) - 1;
            let wrong = currentAns + (Math.random() > 0.5 ? (Math.floor(Math.random()*3)+1) : -(Math.floor(Math.random()*3)+1));
            if(wrong < 0 || wrong === currentAns) wrong = currentAns + 2;
            foods = [
                {val: currentAns, x: Math.floor(Math.random()*maxX)*STEP, y: Math.floor(Math.random()*maxY)*STEP, ok: true},
                {val: wrong, x: Math.floor(Math.random()*maxX)*STEP, y: Math.floor(Math.random()*maxY)*STEP, ok: false}
            ];
            renderFoods();
        }

        function update() {
            if(isPaused) return;
            const head = {...snakeDots[0]};
            if(direction === 'up') head.y -= STEP;
            else if(direction === 'down') head.y += STEP;
            else if(direction === 'left') head.x -= STEP;
            else if(direction === 'right') head.x += STEP;

            const maxX = Math.floor(AREA.offsetWidth / STEP) * STEP;
            const maxY = Math.floor(AREA.offsetHeight / STEP) * STEP;

            if (head.x < 0) head.x = maxX - STEP; else if (head.x >= maxX) head.x = 0;
            if (head.y < 0) head.y = maxY - STEP; else if (head.y >= maxY) head.y = 0;

            snakeDots.unshift(head);
            let ate = false;
            foods.forEach(f => {
                if(Math.abs(head.x - f.x) < 5 && Math.abs(head.y - f.y) < 5) {
                    if(f.ok) {
                        score++; playTone(800, 'sine', 0.15);
                        document.getElementById('score').innerText = score;
                        if(score > highScore) {
                            highScore = score;
                            localStorage.setItem('snakeMathHigh', highScore);
                        }
                        ate = true; nextQuestion();
                    } else {
                        playTone(150, 'triangle', 0.3);
                        AREA.classList.add('shake');
                        setTimeout(() => AREA.classList.remove('shake'), 400);
                        spawnFoods();
                    }
                }
            });
            if(!ate) snakeDots.pop();
            render();
            if(score % 5 === 0) saveGameState();
        }

        function render() {
            AREA.querySelectorAll('.snake-dot').forEach(el => el.remove());
            const colorIdx = Math.floor(score / 10) % COLORS.length;
            snakeDots.forEach((d, i) => {
                const dot = document.createElement('div');
                dot.className = `snake-dot ${i===0?'snake-head':''}`;
                dot.style.width = (STEP - 4) + 'px'; dot.style.height = (STEP - 4) + 'px';
                dot.style.left = (d.x + 2) + 'px'; dot.style.top = (d.y + 2) + 'px';
                dot.style.backgroundColor = i === 0 ? '#1e293b' : COLORS[colorIdx];
                AREA.appendChild(dot);
            });
            document.getElementById('high-score').innerText = highScore;
        }

        function renderFoods() {
            AREA.querySelectorAll('.number-food').forEach(el => el.remove());
            foods.forEach(f => {
                const el = document.createElement('div');
                el.className = "number-food";
                el.style.width = STEP + 'px'; el.style.height = STEP + 'px';
                el.innerText = f.val;
                el.style.left = f.x + 'px'; el.style.top = f.y + 'px';
                AREA.appendChild(el);
            });
        }

        function changeDir(d) { 
            if(!isPaused) { 
                if(d === direction) update(); 
                else { direction = d; playTone(400, 'square', 0.05); } 
            } 
        }

        // 延迟启动
        setTimeout(() => {
            if(!loadGameState()) resetGame();
            else { initGrid(); togglePause(true); gameInterval = setInterval(update, 450); }
        }, 300);
    </script>
</body>
</html>
