<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字贪吃蛇 (环绕版)</title>
    <link rel="manifest" href="data:application/manifest+json,{"name":"数字贪吃蛇","short_name":"数学蛇","start_url":".","display":"standalone","background_color":"#f0f9ff","theme_color":"#6366f1"}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; -webkit-user-select: none; overflow: hidden; background: #f0f9ff; font-family: 'PingFang SC', sans-serif; }
        .food { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #game-area { position: relative; width: 100%; height: 55vh; background: #e0f2fe; border-radius: 24px; overflow: hidden; border: 4px solid #7dd3fc; }
        .snake-dot { position: absolute; width: 22px; height: 22px; background: #38bdf8; border-radius: 6px; transition: all 0.1s linear; }
        .snake-head { background: #0284c7; z-index: 10; }
        .number-food { position: absolute; font-size: 2.2rem; font-weight: 900; color: #6366f1; transform: translate(-50%, -50%); z-index: 5; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <details class="w-full max-w-sm bg-white rounded-2xl shadow-sm mb-4">
        <summary class="p-3 bg-indigo-50 text-indigo-700 font-bold cursor-pointer text-center">⚙️ 设置难度 (10-30)</summary>
        <div class="p-4 space-y-3 text-center">
            <input type="range" id="diff" min="10" max="30" value="10" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            <div class="text-indigo-600 font-bold">当前范围: <span id="r-val">10</span> 以内</div>
        </div>
    </details>

    <div id="game-area"></div>

    <div class="w-full max-w-sm flex items-center justify-between bg-white p-4 rounded-3xl shadow-xl border-2 border-indigo-100 mt-4 mb-4">
        <div id="question" class="text-5xl font-black text-slate-800">? + ?</div>
        <div class="text-right">
            <div class="text-xs text-gray-400">最高记录</div>
            <div class="text-2xl font-bold text-orange-500" id="high-score">0</div>
        </div>
    </div>

    <div class="w-full max-w-sm grid grid-cols-3 gap-3">
        <div></div>
        <button onclick="changeDir('up')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-lg active:translate-y-1 transition-all">⬆️</button>
        <div></div>
        <button onclick="changeDir('left')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-lg active:translate-y-1 transition-all">⬅️</button>
        <button onclick="changeDir('down')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-lg active:translate-y-1 transition-all">⬇️</button>
        <button onclick="changeDir('right')" class="bg-indigo-500 text-white text-3xl p-5 rounded-2xl shadow-lg active:translate-y-1 transition-all">➡️</button>
    </div>

    <script>
        const AREA = document.getElementById('game-area');
        const AREA_W = AREA.offsetWidth;
        const AREA_H = AREA.offsetHeight;
        const STEP = 24; 
        const snakeDots = [{x: 100, y: 100}];
        let direction = 'right', score = 0, currentAns = 0, foods = [], gameInterval;

        // 读取本地最高分
        let highScore = localStorage.getItem('snakeMathHigh') || 0;
        document.getElementById('high-score').innerText = highScore;

        document.getElementById('diff').oninput = function() { 
            document.getElementById('r-val').innerText = this.value; 
            resetGame(); 
        };

        function resetGame() {
            clearInterval(gameInterval);
            score = 0; snakeDots.length = 1; snakeDots[0] = {x: 100, y: 100};
            direction = 'right';
            nextQuestion();
            gameInterval = setInterval(update, 350); // 给娃留出一点反应时间
        }

        function nextQuestion() {
            const max = parseInt(document.getElementById('diff').value);
            const isAdd = Math.random() > 0.5;
            if(isAdd) {
                currentAns = Math.floor(Math.random() * (max - 2)) + 2;
                let a = Math.floor(Math.random() * (currentAns - 1)) + 1;
                document.getElementById('question').innerText = `${a} + ${currentAns - a}`;
            } else {
                let a = Math.floor(Math.random() * (max - 5)) + 5;
                let b = Math.floor(Math.random() * (a - 1)) + 1;
                currentAns = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }
            spawnFoods();
        }

        function spawnFoods() {
            let wrong = currentAns + (Math.random() > 0.5 ? 2 : -2);
            if(wrong < 0 || wrong === currentAns) wrong = currentAns + 1;
            foods = [
                {val: currentAns, x: Math.random()*(AREA_W-60)+30, y: Math.random()*(AREA_H-60)+30, ok: true},
                {val: wrong, x: Math.random()*(AREA_W-60)+30, y: Math.random()*(AREA_H-60)+30, ok: false}
            ];
            renderFoods();
        }

        function update() {
            const head = {...snakeDots[0]};
            if(direction === 'up') head.y -= STEP;
            else if(direction === 'down') head.y += STEP;
            else if(direction === 'left') head.x -= STEP;
            else if(direction === 'right') head.x += STEP;

            // --- 核心修改：坐标环绕 (Wrapping) ---
            if (head.x < 0) head.x = AREA_W - STEP;
            else if (head.x >= AREA_W) head.x = 0;
            if (head.y < 0) head.y = AREA_H - STEP;
            else if (head.y >= AREA_H) head.y = 0;

            snakeDots.unshift(head);
            
            let ate = false;
            foods.forEach(f => {
                const dist = Math.hypot(head.x + 10 - f.x, head.y + 10 - f.y);
                if(dist < 30) {
                    if(f.ok) {
                        score++;
                        if(score > highScore) {
                            highScore = score;
                            localStorage.setItem('snakeMathHigh', highScore);
                            document.getElementById('high-score').innerText = highScore;
                        }
                        ate = true;
                        nextQuestion();
                    } else {
                        // 选错的小惩罚：蛇稍微缩短一点（如果长度大于1）
                        if(snakeDots.length > 2) snakeDots.pop();
                        spawnFoods(); 
                    }
                }
            });

            if(!ate) snakeDots.pop();
            render();
        }

        function render() {
            AREA.querySelectorAll('.snake-dot').forEach(el => el.remove());
            snakeDots.forEach((d, i) => {
                const dot = document.createElement('div');
                dot.className = `snake-dot ${i===0?'snake-head':''}`;
                dot.style.left = d.x + 'px'; dot.style.top = d.y + 'px';
                AREA.appendChild(dot);
            });
        }

        function renderFoods() {
            AREA.querySelectorAll('.number-food').forEach(el => el.remove());
            foods.forEach(f => {
                const el = document.createElement('div');
                el.className = "number-food " + (f.ok?'food':'');
                el.innerText = f.val;
                el.style.left = f.x + 'px'; el.style.top = f.y + 'px';
                AREA.appendChild(el);
            });
        }

        function changeDir(d) { direction = d; }
        resetGame();
    </script>
</body>
</html>
