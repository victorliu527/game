<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数学蛇：全屏竞技版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; -webkit-user-select: none; overflow: hidden; background: #f8fafc; font-family: 'PingFang SC', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* 自适应游戏区：自动撑满剩余空间 */
        #game-container { flex: 1; width: 100%; padding: 10px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; min-height: 0; }
        
        #game-area { 
            position: relative; width: 100%; height: 100%; background-color: #f1f5f9;
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            /* background-size 会在 JS 中动态设置以匹配步长 */
            border-radius: 16px; overflow: hidden; border: 3px solid #cbd5e1; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .snake-dot { position: absolute; border-radius: 4px; transition: all 0.1s linear; z-index: 10; }
        .snake-head { z-index: 11; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        
        /* 移除闪烁动画，让两个数字看起来完全一样 */
        .number-food { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; font-weight: 900; z-index: 5; color: #4f46e5;
            text-shadow: 1px 1px 0px white;
        }

        .shake { animation: shake-anim 0.4s both; background-color: #fee2e2 !important; }
        @keyframes shake-anim { 10%, 90% { transform: translate3d(-3px, 0, 0); } 30%, 70% { transform: translate3d(-5px, 0, 0); } }

        /* 横屏适配 */
        @media (orientation: landscape) {
            body { flex-direction: row; padding: 10px; gap: 15px; }
            #side-panel { width: 250px; height: 100%; flex-direction: column; display: flex; justify-content: space-between; }
            #game-container { height: 100%; }
        }
    </style>
</head>
<body class="p-2">

    <div id="side-panel" class="flex flex-col gap-2">
        <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
            <div class="text-center"><p class="text-[10px] text-gray-400 font-bold uppercase">Best</p><p id="high-score" class="font-bold text-orange-500">0</p></div>
            <button onclick="togglePause()" class="bg-slate-100 px-4 py-2 rounded-xl font-bold text-slate-600 active:scale-95">⏸</button>
            <div class="text-center"><p class="text-[10px] text-gray-400 font-bold uppercase">Score</p><p id="score" class="font-bold text-sky-600">0</p></div>
        </div>

        <div id="q-card" class="bg-white p-4 rounded-2xl shadow-lg border-2 border-indigo-100 text-center transition-all">
            <div id="question" class="text-4xl font-black text-slate-800 tracking-tighter">? + ?</div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="flex flex-col items-center justify-center bg-white rounded-xl border p-1">
                <span class="text-[10px] font-bold text-indigo-400"><b id="rv">10</b></span>
                <input type="range" id="diff" min="10" max="30" value="10" class="w-full h-1 accent-indigo-500" oninput="updateDifficulty(this.value)">
            </div>
            <button onclick="changeDir('up')" class="bg-indigo-500 text-white text-2xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none">⬆️</button>
            <div class="flex items-center justify-center text-2xl" id="level-emoji">🐣</div>
            <button onclick="changeDir('left')" class="bg-indigo-500 text-white text-2xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none">⬅️</button>
            <button onclick="changeDir('down')" class="bg-indigo-500 text-white text-2xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none">⬇️</button>
            <button onclick="changeDir('right')" class="bg-indigo-500 text-white text-2xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none">➡️</button>
        </div>
    </div>

    <div id="game-container">
        <div id="game-area">
            <div id="pause-overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
                <button onclick="togglePause()" class="bg-white text-indigo-600 px-10 py-4 rounded-3xl text-2xl font-black shadow-2xl">继续游戏 ▶️</button>
            </div>
        </div>
    </div>

    <script>
        const AREA = document.getElementById('game-area');
        let STEP = 30; // 默认步长，会在 init 中动态计算
        let snakeDots = [];
        const COLORS = ['#38bdf8', '#4ade80', '#fbbf24', '#a78bfa', '#f87171'];
        let direction = 'right', score = 0, currentAns = 0, foods = [], gameInterval, isPaused = false;
        let highScore = localStorage.getItem('snakeMathHigh') || 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, dur) {
            if(isPaused || audioCtx.state === 'suspended') return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        // --- 响应式网格初始化 ---
        function initGrid() {
            const containerWidth = AREA.offsetWidth;
            const containerHeight = AREA.offsetHeight;
            // 动态计算步长：寻找能被宽高整除的最接近 30 的数值
            STEP = Math.floor(containerWidth / 15); // 横向固定 15 格
            AREA.style.backgroundSize = `${STEP}px ${STEP}px`;
            
            // 重新校准蛇的位置
            snakeDots = [{x: STEP * 2, y: STEP * 2}];
            render();
        }

        function saveGameState() {
            const state = { snakeDots, direction, score, currentAns, foods, diff: document.getElementById('diff').value };
            localStorage.setItem('snakeMathState', JSON.stringify(state));
        }

        function loadGameState() {
            const saved = localStorage.getItem('snakeMathState');
            if(saved) {
                const s = JSON.parse(saved);
                snakeDots = s.snakeDots; direction = s.direction; score = s.score;
                currentAns = s.currentAns; foods = s.foods;
                document.getElementById('diff').value = s.diff;
                document.getElementById('rv').innerText = s.diff;
                document.getElementById('score').innerText = score;
                render(); renderFoods(); updateLevelEmoji();
                return true;
            }
            return false;
        }

        window.addEventListener('resize', initGrid);
        document.addEventListener('visibilitychange', () => { if (document.hidden && !isPaused) togglePause(true); });

        function togglePause(forcePause = false) {
            if(forcePause) isPaused = true; else isPaused = !isPaused;
            document.getElementById('pause-overlay').classList.toggle('hidden', !isPaused);
            if(!isPaused) audioCtx.resume();
            saveGameState();
        }

        function updateDifficulty(v) { document.getElementById('rv').innerText = v; resetGame(); }

        function resetGame() {
            clearInterval(gameInterval);
            score = 0; document.getElementById('score').innerText = 0;
            initGrid();
            direction = 'right';
            nextQuestion();
            gameInterval = setInterval(update, 450);
            saveGameState();
        }

        function nextQuestion() {
            const max = parseInt(document.getElementById('diff').value);
            const isAdd = Math.random() > 0.5;
            if(isAdd) {
                currentAns = Math.floor(Math.random() * (max - 2)) + 2;
                let a = Math.floor(Math.random() * (currentAns - 1)) + 1;
                document.getElementById('question').innerText = `${a} + ${currentAns - a}`;
            } else {
                let a = Math.floor(Math.random() * (max - 5)) + 5;
                let b = Math.floor(Math.random() * (a - 1)) + 1;
                currentAns = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }
            spawnFoods();
        }

        function spawnFoods() {
            const maxX = Math.floor(AREA.offsetWidth / STEP) - 1;
            const maxY = Math.floor(AREA.offsetHeight / STEP) - 1;
            let wrong = currentAns + (Math.random() > 0.5 ? (Math.floor(Math.random()*3)+1) : -(Math.floor(Math.random()*3)+1));
            if(wrong < 0 || wrong === currentAns) wrong = currentAns + 2;
            foods = [
                {val: currentAns, x: Math.floor(Math.random()*maxX)*STEP, y: Math.floor(Math.random()*maxY)*STEP, ok: true},
                {val: wrong, x: Math.floor(Math.random()*maxX)*STEP, y: Math.floor(Math.random()*maxY)*STEP, ok: false}
            ];
            renderFoods();
        }

        function update() {
            if(isPaused) return;
            const head = {...snakeDots[0]};
            if(direction === 'up') head.y -= STEP;
            else if(direction === 'down') head.y += STEP;
            else if(direction === 'left') head.x -= STEP;
            else if(direction === 'right') head.x += STEP;

            const maxX = Math.floor(AREA.offsetWidth / STEP) * STEP;
            const maxY = Math.floor(AREA.offsetHeight / STEP) * STEP;

            if (head.x < 0) head.x = maxX - STEP; else if (head.x >= maxX) head.x = 0;
            if (head.y < 0) head.y = maxY - STEP; else if (head.y >= maxY) head.y = 0;

            snakeDots.unshift(head);
            let ate = false;
            foods.forEach(f => {
                if(Math.abs(head.x - f.x) < 2 && Math.abs(head.y - f.y) < 2) {
                    if(f.ok) {
                        score++; playTone(800, 'sine', 0.2);
                        document.getElementById('score').innerText = score;
                        if(score % 10 === 0) levelUpFlash();
                        if(score > highScore) {
                            highScore = score;
                            localStorage.setItem('snakeMathHigh', highScore);
                        }
                        ate = true; nextQuestion();
                    } else {
                        playTone(150, 'triangle', 0.3);
                        AREA.classList.add('shake');
                        setTimeout(() => AREA.classList.remove('shake'), 400);
                        spawnFoods();
                    }
                }
            });
            if(!ate) snakeDots.pop();
            render();
        }

        function updateLevelEmoji() { document.getElementById('level-emoji').innerText = score >= 30 ? '👑' : (score >= 10 ? '🦖' : '🐣'); }
        function levelUpFlash() { document.getElementById('q-card').style.backgroundColor = '#fef08a'; updateLevelEmoji(); setTimeout(() => document.getElementById('q-card').style.backgroundColor = 'white', 500); }

        function render() {
            AREA.querySelectorAll('.snake-dot').forEach(el => el.remove());
            const colorIdx = Math.floor(score / 10) % COLORS.length;
            snakeDots.forEach((d, i) => {
                const dot = document.createElement('div');
                dot.className = `snake-dot ${i===0?'snake-head':''}`;
                dot.style.width = (STEP - 2) + 'px'; dot.style.height = (STEP - 2) + 'px';
                dot.style.left = (d.x + 1) + 'px'; dot.style.top = (d.y + 1) + 'px';
                dot.style.backgroundColor = i === 0 ? '#0284c7' : COLORS[colorIdx];
                AREA.appendChild(dot);
            });
            document.getElementById('high-score').innerText = highScore;
        }

        function renderFoods() {
            AREA.querySelectorAll('.number-food').forEach(el => el.remove());
            foods.forEach(f => {
                const el = document.createElement('div');
                el.className = "number-food";
                el.style.width = STEP + 'px'; el.style.height = STEP + 'px';
                el.innerText = f.val;
                el.style.left = f.x + 'px'; el.style.top = f.y + 'px';
                AREA.appendChild(el);
            });
        }

        function changeDir(d) { if(!isPaused) { if(d === direction) update(); else { direction = d; playTone(400, 'square', 0.05); } saveGameState(); } }

        setTimeout(() => { // 延迟初始化以确保 DOM 尺寸就绪
            if(!loadGameState()) resetGame();
            else { togglePause(true); initGrid(); gameInterval = setInterval(update, 450); }
        }, 300);
    </script>
</body>
</html>
