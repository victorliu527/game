<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数学蛇：完美网格版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; -webkit-user-select: none; overflow: hidden; background: #f8fafc; font-family: 'PingFang SC', sans-serif; }
        
        /* 强制 25px 步长的网格背景 */
        #game-area { 
            position: relative; 
            width: 350px; /* 固定宽度以便完美对齐网格 */
            height: 400px; 
            background-color: #f1f5f9;
            background-image: 
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 25px 25px; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 4px solid #cbd5e1;
            margin: 0 auto;
        }

        .snake-dot { 
            position: absolute; 
            width: 21px; /* 留一点缝隙看网格线 */
            height: 21px; 
            border-radius: 4px; 
            transition: all 0.1s linear; 
            z-index: 10;
        }
        
        .snake-head { z-index: 11; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* 数字食物：强制占满一个格子，文字居中 */
        .number-food { 
            position: absolute; 
            width: 25px; 
            height: 25px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem; 
            font-weight: 900; 
            z-index: 5;
            color: #4f46e5;
        }

        .food-hint { animation: bounce 0.8s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); color: #ef4444; } }
        
        .shake { animation: shake-anim 0.4s both; background-color: #fee2e2 !important; }
        @keyframes shake-anim { 10%, 90% { transform: translate3d(-2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-sm flex justify-between items-center mb-4">
        <div class="text-center"><p class="text-[10px] text-gray-400 font-bold">BEST</p><p id="high-score" class="font-bold text-orange-500">0</p></div>
        <button onclick="togglePause()" id="pause-btn" class="bg-white border-2 border-slate-200 px-6 py-1 rounded-full font-bold text-slate-600 active:bg-slate-100">⏸ 暂停</button>
        <div class="text-center"><p class="text-[10px] text-gray-400 font-bold">SCORE</p><p id="score" class="font-bold text-sky-600">0</p></div>
    </div>

    <div id="game-area">
        <div id="pause-overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
            <button onclick="togglePause()" class="bg-white text-indigo-600 px-10 py-4 rounded-3xl text-3xl font-black shadow-2xl">继续 ▶️</button>
        </div>
    </div>

    <div id="q-card" class="w-full max-w-[350px] bg-white p-4 rounded-2xl shadow-lg border-2 border-indigo-50 mt-4 mb-4 text-center">
        <div id="question" class="text-4xl font-black text-slate-800 tracking-tighter italic">准备好了吗?</div>
    </div>

    <div class="w-full max-w-[350px] grid grid-cols-3 gap-3">
        <div class="flex flex-col items-center justify-center bg-white rounded-2xl border-2 border-slate-100 p-1">
            <span class="text-[10px] text-gray-400 font-bold italic">范围: <b id="rv">10</b></span>
            <input type="range" id="diff" min="10" max="30" value="10" class="w-full h-1 accent-indigo-500" oninput="document.getElementById('rv').innerText=this.value;resetGame()">
        </div>
        <button onclick="changeDir('up')" class="bg-indigo-500 text-white text-3xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none transition-all">⬆️</button>
        <div class="flex items-center justify-center text-3xl" id="level-emoji">🐣</div>
        
        <button onclick="changeDir('left')" class="bg-indigo-500 text-white text-3xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none transition-all">⬅️</button>
        <button onclick="changeDir('down')" class="bg-indigo-500 text-white text-3xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none transition-all">⬇️</button>
        <button onclick="changeDir('right')" class="bg-indigo-500 text-white text-3xl p-4 rounded-xl shadow-[0_4px_0_#4338ca] active:translate-y-1 active:shadow-none transition-all">➡️</button>
    </div>

    <script>
        const AREA = document.getElementById('game-area');
        const STEP = 25; // 严格步长
        const snakeDots = [{x: 150, y: 150}]; // 初始坐标必须是 STEP 的倍数
        const COLORS = ['#38bdf8', '#4ade80', '#fbbf24', '#a78bfa', '#f87171'];
        let direction = 'right', score = 0, currentAns = 0, foods = [], gameInterval, isPaused = false;
        let highScore = localStorage.getItem('snakeMathHigh') || 0;
        document.getElementById('high-score').innerText = highScore;

        // 音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, dur) {
            if(isPaused) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').classList.toggle('hidden');
            document.getElementById('pause-btn').innerText = isPaused ? "▶️ 继续" : "⏸ 暂停";
        }

        function resetGame() {
            clearInterval(gameInterval);
            score = 0; document.getElementById('score').innerText = 0;
            snakeDots.length = 1; snakeDots[0] = {x: 150, y: 150};
            direction = 'right';
            nextQuestion();
            gameInterval = setInterval(update, 450); 
        }

        function nextQuestion() {
            const max = parseInt(document.getElementById('diff').value);
            const isAdd = Math.random() > 0.5;
            if(isAdd) {
                currentAns = Math.floor(Math.random() * (max - 2)) + 2;
                let a = Math.floor(Math.random() * (currentAns - 1)) + 1;
                document.getElementById('question').innerText = `${a} + ${currentAns - a}`;
            } else {
                let a = Math.floor(Math.random() * (max - 5)) + 5;
                let b = Math.floor(Math.random() * (a - 1)) + 1;
                currentAns = a - b;
                document.getElementById('question').innerText = `${a} - ${b}`;
            }
            spawnFoods();
        }

        function spawnFoods() {
            const maxX = (AREA.offsetWidth / STEP) - 1;
            const maxY = (AREA.offsetHeight / STEP) - 1;
            
            let wrong = currentAns + (Math.random() > 0.5 ? 1 : -1);
            if(wrong < 0 || wrong === currentAns) wrong = currentAns + 2;

            // 核心改进：生成坐标必须是 STEP 的倍数
            foods = [
                {val: currentAns, x: Math.floor(Math.random()*maxX)*STEP, y: Math.floor(Math.random()*maxY)*STEP, ok: true},
                {val: wrong, x: Math.floor(Math.random()*maxX)*STEP, y: Math.floor(Math.random()*maxY)*STEP, ok: false}
            ];
            renderFoods();
        }

        function update() {
            if(isPaused) return;
            const head = {...snakeDots[0]};
            if(direction === 'up') head.y -= STEP;
            else if(direction === 'down') head.y += STEP;
            else if(direction === 'left') head.x -= STEP;
            else if(direction === 'right') head.x += STEP;

            // 穿墙
            if (head.x < 0) head.x = 325;
            else if (head.x > 325) head.x = 0;
            if (head.y < 0) head.y = 375;
            else if (head.y > 375) head.y = 0;

            snakeDots.unshift(head);
            let ate = false;

            foods.forEach(f => {
                // 精准对齐检测：坐标完全重合
                if(head.x === f.x && head.y === f.y) {
                    if(f.ok) {
                        score++; playTone(800, 'sine', 0.2);
                        document.getElementById('score').innerText = score;
                        if(score % 10 === 0) {
                            document.getElementById('q-card').style.backgroundColor = '#fef08a';
                            setTimeout(() => document.getElementById('q-card').style.backgroundColor = 'white', 500);
                        }
                        if(score > highScore) {
                            highScore = score;
                            localStorage.setItem('snakeMathHigh', highScore);
                            document.getElementById('high-score').innerText = highScore;
                        }
                        ate = true; nextQuestion();
                    } else {
                        playTone(150, 'triangle', 0.3);
                        AREA.classList.add('shake');
                        setTimeout(() => AREA.classList.remove('shake'), 400);
                        spawnFoods();
                    }
                }
            });

            if(!ate) snakeDots.pop();
            render();
        }

        function render() {
            AREA.querySelectorAll('.snake-dot').forEach(el => el.remove());
            const colorIdx = Math.floor(score / 10) % COLORS.length;
            snakeDots.forEach((d, i) => {
                const dot = document.createElement('div');
                dot.className = `snake-dot ${i===0?'snake-head':''}`;
                dot.style.left = (d.x + 2) + 'px'; // +2px 居中对齐网格线
                dot.style.top = (d.y + 2) + 'px';
                dot.style.backgroundColor = i === 0 ? '#0284c7' : COLORS[colorIdx];
                AREA.appendChild(dot);
            });
        }

        function renderFoods() {
            AREA.querySelectorAll('.number-food').forEach(el => el.remove());
            foods.forEach(f => {
                const el = document.createElement('div');
                el.className = "number-food " + (f.ok?'food-hint':'');
                el.innerText = f.val;
                el.style.left = f.x + 'px'; el.style.top = f.y + 'px';
                AREA.appendChild(el);
            });
        }

        function changeDir(d) {
            if(isPaused) return;
            if(d === direction) { update(); } 
            else { direction = d; playTone(400, 'square', 0.05); }
        }

        resetGame();
    </script>
</body>
</html>
